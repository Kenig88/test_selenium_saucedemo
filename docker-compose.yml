version: "3.9"

x-ui-common: &ui-common
  build: .
  working_dir: /usr/workspace
  volumes:
    - .:/usr/workspace
  environment:
    CHROME_BIN: /usr/bin/chromium
    CHROMEDRIVER_PATH: /usr/bin/chromedriver
    PYTEST_WORKERS: ${PYTEST_WORKERS:-2}
    STANDARD_USER: ${STANDARD_USER:?STANDARD_USER is required}
    LOCKED_OUT_USER: ${LOCKED_OUT_USER:?LOCKED_OUT_USER is required}
    PROBLEM_USER: ${PROBLEM_USER:?PROBLEM_USER is required}
    PERFORMANCE_GLITCH_USER: ${PERFORMANCE_GLITCH_USER:?PERFORMANCE_GLITCH_USER is required}
    ERROR_USER: ${ERROR_USER:?ERROR_USER is required}
    VISUAL_USER: ${VISUAL_USER:?VISUAL_USER is required}
    INVALID_LOGIN: ${INVALID_LOGIN:?INVALID_LOGIN is required}
    SECRET_SAUCE: ${SECRET_SAUCE:?SECRET_SAUCE is required}
    INVALID_PASSWORD: ${INVALID_PASSWORD:?INVALID_PASSWORD is required}

services:
  all:
    <<: *ui-common
    command: >
      sh -c "pytest -sv -n ${PYTEST_WORKERS:-2}
      --alluredir=allure-results --clean-alluredir"

  e2e:
    <<: *ui-common
    command: >
      sh -c "pytest -sv -m e2e -n ${PYTEST_WORKERS:-2}
      --alluredir=allure-results --clean-alluredir"

  regression:
    <<: *ui-common
    command: >
      sh -c "pytest -sv -m regression -n ${PYTEST_WORKERS:-2}
      --alluredir=allure-results --clean-alluredir"